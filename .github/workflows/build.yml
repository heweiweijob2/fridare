name: Build Basic Windows Frida
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Frida
        uses: actions/checkout@v4
        with:
          repository: frida/frida
          submodules: recursive
          path: frida
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja
      - name: Configure and Build
        run: |
          cd frida
          python tools\gyp\gyp_main.py --depth=. -G msvs_version=2022 frida.sln
          msbuild frida.sln /p:Configuration=Release /p:Platform=x64
      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          name: basic-frida-server
          path: frida\build\Release\frida-server.exe
