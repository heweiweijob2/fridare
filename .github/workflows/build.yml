name: Build Patched Frida
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Frida Server
        run: |
          cd win
          curl -o frida-server.exe https://github.com/frida/frida/releases/download/16.4.1/frida-server-16.4.1-windows-x64.exe
      - name: Run Patch Script
        run: |
          cd win
          .\patch-frida.cmd
      - name: Upload Patched File
        uses: actions/upload-artifact@v4
        with:
          name: patched-frida-server
          path: win/frida-server.exe
