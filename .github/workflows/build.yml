name: Build Windows Frida Server
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Frida源码
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: 初始化编译环境
        run: |
          python tools\ensure-submodules.py
          .\configure
      - name: 编译frida-server
        run: .\make
      - name: 上传编译好的文件
        uses: actions/upload-artifact@v4
        with:
          name: frida-server-windows
          path: build\frida-server.exe
